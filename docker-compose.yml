services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: mesapro
      POSTGRES_USER: mesapro
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mesapro_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mesapro -d mesapro"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 8787
      DATABASE_URL: postgres://mesapro:${POSTGRES_PASSWORD:-mesapro_password}@postgres:5432/mesapro
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8787}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost}
      METRICS_TOKEN: ${METRICS_TOKEN:-}
      METRICS_PUBLIC: ${METRICS_PUBLIC:-false}
      BACKUP_INTERVAL_MINUTES: ${BACKUP_INTERVAL_MINUTES:-1440}
      BACKUP_DIR: /app/backups
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
      BACKUP_ENCRYPTION_KEY: ${BACKUP_ENCRYPTION_KEY:-}
      BACKUP_ALERT_WEBHOOK: ${BACKUP_ALERT_WEBHOOK:-}
    volumes:
      - app_backups:/app/backups
    ports:
      - "8787:8787"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - app
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  app_backups:
  caddy_data:
  caddy_config:
